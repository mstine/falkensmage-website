# Deploy Hugo site to GitHub Pages
# Source: Official Hugo starter workflow pattern (D-06)
# Triggers: push to main, a nightly schedule (refreshes the CURRENTLY feed),
# and manual dispatch.

name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  # Nightly rebuild re-fetches the Feral Architecture RSS so the CURRENTLY
  # section stays fresh without a manual push. (GitHub cron is UTC and may
  # drift/skip under load — fine for a once-a-day content refresh.)
  schedule:
    - cron: "0 9 * * *"   # ~03:00–04:00 America/Chicago
  workflow_dispatch: {}   # manual "rebuild now" button in the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      # No Dart Sass step: the arcaeon theme has zero .scss/.sass files and its
      # only CSS pipeline is css.Build (esbuild, bundled in Hugo Extended).
      # `sudo snap install dart-sass` was dead weight AND the flaky step that
      # broke the build ("error: cannot install dart-sass: too many requests"
      # — Snap Store rate-limiting). Removed. Re-add only if .scss is introduced.

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
