<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  {{ with .Description }}<meta name="description" content="{{ . }}">
  {{ else }}{{ with site.Params.description }}<meta name="description" content="{{ . }}">
  {{ end }}{{ end }}

  {{/* Font preload — stable static paths, crossorigin required (PERF-03, D-07) */}}
  <link rel="preload" href="/fonts/cinzel-latin-wght-normal.woff2"
        as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/space-grotesk-latin-wght-normal.woff2"
        as="font" type="font/woff2" crossorigin>

  {{ $css := resources.Get "css/main.css" | css.Build | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
