<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>

  {{/* Font preloads — prevent FOIT. Files served from static/fonts/ at root-relative paths. */}}
  <link rel="preload" href="/fonts/cinzel-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/space-grotesk-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>

  {{/* CSS via Hugo css.Build pipeline */}}
  {{ $css := resources.Get "css/main.css" | css.Build | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
