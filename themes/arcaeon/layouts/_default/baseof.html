<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  {{ with .Description }}<meta name="description" content="{{ . }}">
  {{ else }}{{ with site.Params.description }}<meta name="description" content="{{ . }}">
  {{ end }}{{ end }}

  {{/* CSS via Hugo css.Build pipeline — font urls resolved by css.Build, no separate preload needed */}}
  {{ $css := resources.Get "css/main.css" | css.Build | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
<body>
  {{ block "main" . }}{{ end }}
</body>
</html>
