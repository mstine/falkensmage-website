<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Neon Magenta glow layer underneath (ARCAEON palette, INFRA-05) -->
  <path
    d="M 16 16
       C 16 12, 10 8, 6 10
       C 2 12, 2 20, 6 22
       C 10 24, 16 20, 16 16
       C 16 12, 22 8, 26 10
       C 30 12, 30 20, 26 22
       C 22 24, 16 20, 16 16 Z"
    fill="none"
    stroke="#ff3cac"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.6"
    filter="url(#glow)"
  />
  <!-- Electric Violet main stroke (ARCAEON palette, INFRA-05) -->
  <path
    d="M 16 16
       C 16 12, 10 8, 6 10
       C 2 12, 2 20, 6 22
       C 10 24, 16 20, 16 16
       C 16 12, 22 8, 26 10
       C 30 12, 30 20, 26 22
       C 22 24, 16 20, 16 16 Z"
    fill="none"
    stroke="#7a2cff"
    stroke-width="2.5"
    stroke-linecap="round"
    filter="url(#glow)"
  />
</svg>
